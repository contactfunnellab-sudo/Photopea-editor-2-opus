<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Feature Transfer Executor (Path-Based)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
    #pp { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <iframe id="pp" src="https://www.photopea.com"></iframe>
<script>
var frame = document.getElementById('pp');

function toBase64(buffer) {
  var bytes = new Uint8Array(buffer);
  var binary = '';
  var chunk = 8192;
  for (var i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function postAndWait(message, options) {
  var opts = options || {};
  var expectBinary = Boolean(opts.expectBinary);
  var timeoutMs = opts.timeoutMs || 120000;
  var transfer = opts.transfer || [];

  return new Promise(function(resolve, reject) {
    var binaryPayload = null;
    var lastPayload = null;
    var timer = setTimeout(function() {
      window.removeEventListener('message', onMsg);
      reject(new Error('Timed out waiting for Photopea'));
    }, timeoutMs);

    function onMsg(e) {
      if (e.source !== frame.contentWindow) return;
      if (expectBinary && e.data instanceof ArrayBuffer) {
        binaryPayload = e.data;
        return;
      }
      if (e.data !== 'done') {
        lastPayload = e.data;
      }
      if (e.data === 'done') {
        clearTimeout(timer);
        window.removeEventListener('message', onMsg);
        resolve(expectBinary ? binaryPayload : lastPayload);
      }
    }

    window.addEventListener('message', onMsg);
    frame.contentWindow.postMessage(message, '*', transfer);
  });
}

function waitUntilReady() {
  return postAndWait('app.echoToOE("ready")');
}

function waitForDocumentCount(minCount) {
  var start = Date.now();
  function check() {
    if (Date.now() - start > 120000) {
      return Promise.reject(new Error('Timed out waiting for ' + minCount + ' documents'));
    }
    return postAndWait('app.echoToOE(String(app.documents.length))').then(function(result) {
      if (Number(result) >= minCount) return;
      return new Promise(function(r) { setTimeout(r, 250); }).then(check);
    });
  }
  return check();
}

function fetchBinary(url) {
  return fetch(url, { cache: 'no-store' }).then(function(res) {
    if (!res.ok) throw new Error('Failed to fetch (' + res.status + '): ' + url);
    return res.arrayBuffer();
  });
}

function loadImages(baseUrl, refUrl) {
  return fetchBinary(baseUrl).then(function(baseBuf) {
    return postAndWait(baseBuf, { transfer: [baseBuf] });
  }).then(function() {
    return waitForDocumentCount(1);
  }).then(function() {
    return fetchBinary(refUrl);
  }).then(function(refBuf) {
    return postAndWait(refBuf, { transfer: [refBuf] });
  }).then(function() {
    return waitForDocumentCount(2);
  });
}

function buildStackScript() {
  return [
    'function layerSize(lyr) {',
    '  var b = lyr.bounds;',
    '  return { w: Number(b[2]) - Number(b[0]), h: Number(b[3]) - Number(b[1]) };',
    '}',
    'var base = app.documents[0];',
    'var ref  = app.documents[1];',
    'if (!base || !ref) throw new Error("Expected two documents.");',
    'var refW = Number(ref.width);',
    'var refH = Number(ref.height);',
    'app.activeDocument = ref;',
    'ref.selection.selectAll();',
    'ref.selection.copy();',
    'app.activeDocument = base;',
    'base.paste();',
    'var refLayer = base.activeLayer;',
    'refLayer.name = "Reference";',
    'var sz = layerSize(refLayer);',
    'if (sz.w > 0 && sz.h > 0) {',
    '  refLayer.resize((refW / sz.w) * 100, (refH / sz.h) * 100);',
    '}',
    'app.activeDocument = ref;',
    'ref.close(SaveOptions.DONOTSAVECHANGES);',
    'app.activeDocument = base;',
    'app.echoToOE("stacked");'
  ].join('\n');
}

/**
 * Compute bounding box {width, height} from a point array [[x,y], ...].
 * Used to derive non-uniform scaleX/scaleY from source vs target dimensions.
 * Runs in the browser page context (not inside Photopea script).
 */
function computeBBox(points) {
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (var i = 0; i < points.length; i++) {
    if (points[i][0] < minX) minX = points[i][0];
    if (points[i][1] < minY) minY = points[i][1];
    if (points[i][0] > maxX) maxX = points[i][0];
    if (points[i][1] > maxY) maxY = points[i][1];
  }
  return { width: maxX - minX, height: maxY - minY };
}

/**
 * Build Photopea script for path-based feature transfer.
 * Each primitive is executed SEPARATELY — not merged.
 * Each feature gets its own layer.
 *
 * Default execution path (fitMode="similarity", maskMode="none"):
 *   1. Select source polygon on reference layer
 *   2. Feather source selection
 *   3. Copy and paste as new layer
 *   4. Apply uniform scale + rotation + translation from placementTransform
 *   5. No target clipping — donor blends naturally via feathered edges
 *
 * Optional modes (set per-primitive):
 *   fitMode="non_uniform_bbox" — derive scaleX/scaleY from source vs target
 *     bounding boxes. Adapts donor aspect ratio to target, but can distort.
 *   maskMode="target_polygon" — clip donor to target eye polygon via
 *     select → invert → cut. Forces conformance to base eyelid shape,
 *     but can create uncanny hard clips.
 */
function buildPathTransferScript(selectionPrimitives) {
  var script = [
    'var doc = app.activeDocument;',
    'var refLayer = null;',
    'for (var i = 0; i < doc.layers.length; i++) {',
    '  if (doc.layers[i].name === "Reference") { refLayer = doc.layers[i]; break; }',
    '}',
    'if (!refLayer) throw new Error("Reference layer not found");',
    ''
  ];

  for (var p = 0; p < selectionPrimitives.length; p++) {
    var prim = selectionPrimitives[p];
    var label = prim.label || ('feature_' + p);
    var feather = (prim.blend && prim.blend.featherRadius !== undefined) ? prim.blend.featherRadius : 2;
    var opacity = (prim.blend && prim.blend.opacity !== undefined) ? prim.blend.opacity : 100;
    var srcPoints = JSON.stringify(prim.source.points);
    var tx = (prim.placementTransform && prim.placementTransform.translateX) || 0;
    var ty = (prim.placementTransform && prim.placementTransform.translateY) || 0;
    var scale = (prim.placementTransform && prim.placementTransform.scale) || 1.0;
    var rotation = (prim.placementTransform && prim.placementTransform.rotation) || 0;

    // Target-shape masking: feather for the mask edge (separate from source feather).
    // Source feather softens the copied donor edge during copy.
    // Mask feather softens the boundary where the clipped donor meets the base face.
    var maskFeather = (prim.blend && prim.blend.maskFeatherRadius !== undefined)
      ? prim.blend.maskFeatherRadius : 1;
    var hasTgtPoints = prim.target && Array.isArray(prim.target.points) && prim.target.points.length >= 3;
    var tgtPoints = hasTgtPoints ? JSON.stringify(prim.target.points) : null;

    // ---- Fit Mode ----
    // "similarity" (default): use placementTransform.scale uniformly.
    //   Geometry already computed the correct scale from eye anchor pairs.
    // "non_uniform_bbox" (opt-in): derive scaleX/scaleY from source vs target
    //   bounding boxes. Legacy mode — can distort the eye shape.
    var fitMode = prim.fitMode || 'similarity';
    var useShapeFit = false;
    var scaleXPct, scaleYPct;
    if (fitMode === 'non_uniform_bbox' && hasTgtPoints) {
      var srcBB = computeBBox(prim.source.points);
      var tgtBB = computeBBox(prim.target.points);
      if (srcBB.width > 1 && srcBB.height > 1 && tgtBB.width > 1 && tgtBB.height > 1) {
        scaleXPct = Math.round((tgtBB.width / srcBB.width) * 100 * 10) / 10;
        scaleYPct = Math.round((tgtBB.height / srcBB.height) * 100 * 10) / 10;
        useShapeFit = true;
      }
    }

    // ---- Mask Mode ----
    // "none" (default): no target polygon clipping. The donor patch sits
    //   naturally with its own eyelid contour, blended via source feather.
    // "target_polygon" (opt-in): clip donor to target eye polygon via
    //   select → invert → cut. Legacy mode — can create uncanny hard clips.
    var maskMode = prim.maskMode || 'none';

    var transferMode = 'fit=' + fitMode + ' mask=' + maskMode;

    script.push('// Feature ' + p + ': ' + label + ' (' + transferMode + ', opacity=' + opacity + ', feather=' + feather + ')');
    script.push('doc.activeLayer = refLayer;');
    script.push('doc.selection.select(' + srcPoints + ');');
    if (feather > 0) {
      script.push('try { doc.selection.feather(' + feather + '); } catch(e) {}');
    }
    script.push('doc.selection.copy();');
    script.push('doc.paste();');
    script.push('var feat' + p + ' = doc.activeLayer;');
    script.push('feat' + p + '.name = "Feature: ' + label.replace(/"/g, '\\"') + '";');

    // Apply layer opacity from blend policy
    if (opacity < 100) {
      script.push('feat' + p + '.opacity = ' + opacity + ';');
    }

    // Apply scale
    if (useShapeFit) {
      // Non-uniform bbox resize (opt-in legacy mode via fitMode="non_uniform_bbox")
      script.push('feat' + p + '.resize(' + scaleXPct + ', ' + scaleYPct + ', AnchorPosition.MIDDLECENTER);');
    } else {
      // Geometry-derived scale (default similarity mode).
      // Uses scaleX/scaleY from placementTransform if present (landmark-derived),
      // falls back to uniform scale. This is NOT the same as non_uniform_bbox:
      // scaleX/scaleY come from anatomical landmark correspondences in geometry
      // (corner distance for X, lid distance for Y), not from bbox comparison.
      // For blink repair, geometry sets scaleX === scaleY (uniform, preserves
      // donor openness). For non-blink, scaleY may differ (captures eye opening).
      var sx = (prim.placementTransform && prim.placementTransform.scaleX) || scale;
      var sy = (prim.placementTransform && prim.placementTransform.scaleY) || scale;
      var sxPct = Math.round(sx * 100 * 10) / 10;
      var syPct = Math.round(sy * 100 * 10) / 10;
      if (sxPct !== 100 || syPct !== 100) {
        script.push('feat' + p + '.resize(' + sxPct + ', ' + syPct + ', AnchorPosition.MIDDLECENTER);');
      }
    }
    if (rotation !== 0) {
      var deg = Math.round(rotation * 180 / Math.PI * 100) / 100;
      script.push('feat' + p + '.rotate(' + deg + ', AnchorPosition.MIDDLECENTER);');
    }
    if (tx !== 0 || ty !== 0) {
      script.push('feat' + p + '.translate(' + Math.round(tx * 10) / 10 + ', ' + Math.round(ty * 10) / 10 + ');');
    }

    script.push('doc.selection.deselect();');

    // TARGET-SHAPE MASKING (opt-in only when maskMode === 'target_polygon')
    if (maskMode === 'target_polygon' && tgtPoints) {
      script.push('// Target-shape mask: clip donor to base eye opening (opt-in)');
      script.push('try {');
      script.push('  doc.activeLayer = feat' + p + ';');
      script.push('  doc.selection.select(' + tgtPoints + ');');
      if (maskFeather > 0) {
        script.push('  try { doc.selection.feather(' + maskFeather + '); } catch(e) {}');
      }
      script.push('  doc.selection.invert();');
      script.push('  doc.selection.cut();');
      script.push('  doc.selection.deselect();');
      script.push('} catch(maskErr) {');
      script.push('  try { doc.selection.deselect(); } catch(e) {}');
      script.push('}');
    }

    script.push('');
  }

  script.push('refLayer.visible = false;');
  script.push('app.echoToOE("transferred");');

  return script.join('\n');
}

window.cleanup = function() {
  return postAndWait(
    'while(app.documents.length>0){app.activeDocument.close(SaveOptions.DONOTSAVECHANGES);}app.echoToOE("cleaned");'
  ).catch(function() {});
};

/**
 * Main entry point — called from Playwright by executor/server.js
 *
 * payload: {
 *   baseImageUrl, referenceImageUrl,
 *   selectionPrimitives: [{ type, label, source: {points}, target: {points}, placementTransform, blend }],
 *   exportFormat, debugExport
 * }
 */
window.runFeatureTransfer = function(payload) {
  var logs = [];
  var t0 = Date.now();

  logs.push('Waiting for Photopea...');
  return waitUntilReady().then(function() {
    logs.push('Photopea ready (' + (Date.now() - t0) + 'ms)');
    logs.push('Loading images...');
    return loadImages(payload.baseImageUrl, payload.referenceImageUrl);
  }).then(function() {
    logs.push('Images loaded (' + (Date.now() - t0) + 'ms)');
    logs.push('Stacking reference onto base...');
    return postAndWait(buildStackScript());
  }).then(function() {
    logs.push('Stacked (' + (Date.now() - t0) + 'ms)');
    var count = payload.selectionPrimitives.length;
    // Log per-primitive transfer mode before execution
    for (var i = 0; i < count; i++) {
      var sp = payload.selectionPrimitives[i];
      var fm = sp.fitMode || 'similarity';
      var mm = sp.maskMode || 'none';
      var mf = (sp.blend && sp.blend.maskFeatherRadius !== undefined) ? sp.blend.maskFeatherRadius : 1;
      if (fm === 'non_uniform_bbox' && sp.target && Array.isArray(sp.target.points) && sp.target.points.length >= 3) {
        var sBB = computeBBox(sp.source.points);
        var tBB = computeBBox(sp.target.points);
        logs.push('prim[' + i + '] ' + (sp.label || '?') + ': fit=' + fm + ' mask=' + mm
          + ' srcBB=' + Math.round(sBB.width) + 'x' + Math.round(sBB.height)
          + ' tgtBB=' + Math.round(tBB.width) + 'x' + Math.round(tBB.height)
          + ' scaleX=' + (Math.round((tBB.width / sBB.width) * 1000) / 1000)
          + ' scaleY=' + (Math.round((tBB.height / sBB.height) * 1000) / 1000)
          + ' maskFeather=' + mf);
      } else {
        var ref = sp.placementTransform && sp.placementTransform._refinement;
        var refInfo = ref
          ? ' refined=' + ref.initError + '->' + ref.finalError
            + ' profile=' + (ref.weightProfile || '?')
            + ' slitAware=' + (ref.slitAware || false)
          : '';
        logs.push('prim[' + i + '] ' + (sp.label || '?') + ': fit=' + fm + ' mask=' + mm
          + ' scale=' + ((sp.placementTransform && sp.placementTransform.scale) || 'n/a')
          + ' scaleX=' + ((sp.placementTransform && sp.placementTransform.scaleX) || 'n/a')
          + ' scaleY=' + ((sp.placementTransform && sp.placementTransform.scaleY) || 'n/a')
          + ' (eye-frame solved)' + refInfo);
      }
    }
    logs.push('Executing path-based transfer (' + count + ' primitive' + (count > 1 ? 's' : '') + ')...');
    return postAndWait(buildPathTransferScript(payload.selectionPrimitives));
  }).then(function() {
    logs.push('Transfer complete (' + (Date.now() - t0) + 'ms)');
    var fmt = payload.exportFormat || 'png';
    logs.push('Exporting as ' + fmt + '...');
    return postAndWait('app.activeDocument.saveToOE("' + fmt + '")', { expectBinary: true });
  }).then(function(imageBinary) {
    logs.push('Image exported (' + (Date.now() - t0) + 'ms)');
    var result = {
      imageBase64: toBase64(imageBinary),
      psdBase64: null,
      logs: logs,
      durationMs: Date.now() - t0
    };

    if (payload.debugExport !== false) {
      logs.push('Exporting PSD (debug)...');
      return postAndWait('app.activeDocument.saveToOE("psd:true")', { expectBinary: true }).then(function(psdBinary) {
        result.psdBase64 = toBase64(psdBinary);
        logs.push('PSD exported (' + (Date.now() - t0) + 'ms)');
        result.logs = logs;
        result.durationMs = Date.now() - t0;
        return result;
      });
    }
    return result;
  });
};
</script>
</body>
</html>
