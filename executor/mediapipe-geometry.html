<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>MediaPipe Eye Geometry — Browser-Side Face Mesh</title>
  <style>
    html, body { margin: 0; padding: 20px; background: #111; color: #eee; font-family: monospace; }
    #status { margin-bottom: 10px; }
    canvas { border: 1px solid #333; margin: 5px; max-width: 45%; }
    .debug-container { display: flex; flex-wrap: wrap; gap: 10px; }
  </style>
</head>
<body>
  <div id="status">Loading MediaPipe Face Mesh...</div>
  <div id="debug-container" class="debug-container" style="display:none;"></div>

<script type="module">
// =============================================
// MediaPipe Face Mesh — Browser-Side Geometry
// Detects faces + per-eye landmarks on both images,
// computes separate left_eye and right_eye geometry
// with per-eye transforms.
// Called from Playwright via window.detectEyeGeometry()
// =============================================

import { FaceLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.15/vision_bundle.mjs";

// MediaPipe FaceMesh eye landmark indices (same as face-landmarks.js)
const FEATURE_GROUPS = {
  left_eye: [33, 246, 161, 160, 159, 158, 157, 173, 133, 155, 154, 153, 145, 144, 163, 7],
  right_eye: [362, 398, 384, 385, 386, 387, 388, 466, 263, 249, 390, 373, 374, 380, 381, 382]
};

// Key anchor landmarks for per-eye transform computation
const EYE_ANCHORS = {
  leftOuterCorner: 33,
  leftInnerCorner: 133,
  rightInnerCorner: 362,
  rightOuterCorner: 263
};

// Detail anchor set for correspondence-based transforms.
// All indices are from the MediaPipe 478-point face mesh (iris-refined model).
//
// IMPORTANT — WHY scaleY (lid height) is NOT used as the default blink-repair target:
// In blink repair, the BASE eye is often closed or partially closed. The base
// upper↔lower lid distance describes the PROBLEM (the blink), not the desired
// appearance. If geometry uses that closed-lid height to derive scaleY, it
// literally teaches the system to reproduce the blink — squashing the open
// donor eye to match the closed base eye. That is the opposite of blink repair.
//
// For blink repair the correct default is:
//   - Uniform scale from eye CORNER distance (stable whether open or closed)
//   - Rotation from corner-to-corner vector
//   - Translation solved so corners land on target corners
//   - Donor eye openness is PRESERVED from the reference, not overridden by base
//
// The lid-height anchors are kept for future optional modes (e.g. non-blink
// cosmetic transfer where matching aperture is desirable), but they do NOT
// drive the default transform.
const EYE_DETAIL_ANCHORS = {
  left_eye: {
    outerCorner: 33,     // temporal corner
    innerCorner: 133,    // nasal corner
    upperLid: 159,       // upper eyelid apex (NOT used for default scale)
    lowerLid: 145,       // lower eyelid apex (NOT used for default scale)
    irisCenter: 468      // iris center (from 478-point model)
  },
  right_eye: {
    innerCorner: 362,    // nasal corner
    outerCorner: 263,    // temporal corner
    upperLid: 386,       // upper eyelid apex (NOT used for default scale)
    lowerLid: 374,       // lower eyelid apex (NOT used for default scale)
    irisCenter: 473      // iris center (from 478-point model)
  }
};

// Face-structure stabilizer: nose bridge landmark.
// Used to anchor the eye placement relative to the overall face geometry,
// not just relative to the eye's own bbox. This prevents the transferred
// eye from drifting away from the nose line / facial midline.
// Landmark 168 sits between the eyes on the nose bridge — stable regardless
// of whether eyes are open or closed.
const FACE_STRUCTURE_ANCHORS = {
  noseBridge: 168
};

let faceLandmarker = null;

async function initMediaPipe() {
  const statusEl = document.getElementById('status');
  try {
    statusEl.textContent = 'Loading MediaPipe WASM runtime...';
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.15/wasm"
    );
    statusEl.textContent = 'Creating FaceLandmarker...';
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "CPU"
      },
      runningMode: "IMAGE",
      numFaces: 10,
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrices: false
    });
    statusEl.textContent = 'MediaPipe ready.';
    window.mediapipeReady = true;
  } catch (err) {
    statusEl.textContent = 'MediaPipe init FAILED: ' + err.message;
    console.error('[mediapipe] Init error:', err);
    throw err;
  }
}

// ---- Geometry Helpers (ported from geometry.js) ----

function centroid(points) {
  let sx = 0, sy = 0;
  for (const [x, y] of points) { sx += x; sy += y; }
  return [sx / points.length, sy / points.length];
}

function expandPointsAsymmetric(points, topPx, bottomPx, leftPx, rightPx) {
  // Asymmetric expand: different amounts per direction
  if (points.length === 0) return points.slice();
  const [cx, cy] = centroid(points);
  return points.map(([x, y]) => {
    const dx = x - cx, dy = y - cy;
    // Determine which side this point is on relative to centroid
    const expandX = dx >= 0 ? rightPx : leftPx;
    const expandY = dy >= 0 ? bottomPx : topPx;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 0.001) return [x, y];
    // Directional expand: scale the radial offset per-direction
    const radialExpand = Math.sqrt(expandX * expandX * (dx * dx) + expandY * expandY * (dy * dy)) / dist;
    const scale = (dist + radialExpand) / dist;
    return [cx + dx * scale, cy + dy * scale];
  });
}

function chaikinSmooth(points, iterations) {
  if (iterations <= 0 || points.length < 3) return points.slice();
  let pts = points.slice();
  for (let iter = 0; iter < iterations; iter++) {
    const smoothed = [];
    const n = pts.length;
    for (let i = 0; i < n; i++) {
      const [x1, y1] = pts[i];
      const [x2, y2] = pts[(i + 1) % n];
      smoothed.push([0.75 * x1 + 0.25 * x2, 0.75 * y1 + 0.25 * y2]);
      smoothed.push([0.25 * x1 + 0.75 * x2, 0.25 * y1 + 0.75 * y2]);
    }
    pts = smoothed;
  }
  return pts;
}

function ensureClosed(points) {
  if (points.length < 2) return points;
  const first = points[0], last = points[points.length - 1];
  const dx = first[0] - last[0], dy = first[1] - last[1];
  if (Math.sqrt(dx * dx + dy * dy) > 0.5) return [...points, [first[0], first[1]]];
  return points;
}

function roundPoints(points) {
  return points.map(([x, y]) => [Math.round(x * 10) / 10, Math.round(y * 10) / 10]);
}

// Carrier patch expansion for a single eye.
//
// THE PATCH IS A CARRIER, NOT THE PLACEMENT TARGET.
// The patch exists to transport donor eye texture plus enough surrounding skin
// for natural blending. The anatomical eye placement is solved separately
// by solveEyeFrameTransform() using multi-anchor error minimization.
// The patch follows the solved eye — it does not define where the eye goes.
//
// Margins:
//   - top (85% of eye height): upper eyelid fold + brow transition
//   - bottom (65% of eye height): lower lid + under-eye skin + lower lash line
//   - horizontal (18% of eye width): inner/outer corner skin + blend room
//
// Lower-lid preservation:
//   Bottom margin is biased higher than top to capture lower lash texture.
//   Chaikin smoothing stays at 1 iteration (reduced from original 2) to
//   preserve angular detail of lower-lid contour — prevents rounding off
//   the lower lash line into a generic curve.
//
// Horizontal margin:
//   Increased from 15% to 18% for better corner skin coverage. The corners
//   are the primary alignment targets, so having enough blend room around
//   them is important for a natural transition.
function processEyePoints(rawPoints) {
  const bb = boundingBox(rawPoints);
  const eyeW = bb.width;
  const eyeH = bb.height;

  const topMargin = Math.max(4, Math.round(eyeH * 0.85));
  const bottomMargin = Math.max(4, Math.round(eyeH * 0.65));
  const hMargin = Math.max(4, Math.round(eyeW * 0.18));

  let pts = expandPointsAsymmetric(rawPoints, topMargin, bottomMargin, hMargin, hMargin);
  pts = chaikinSmooth(pts, 1);
  pts = ensureClosed(pts);
  pts = roundPoints(pts);
  return pts;
}

function boundingBox(points) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const [x, y] of points) {
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  return { x: Math.round(minX), y: Math.round(minY), width: Math.round(maxX - minX), height: Math.round(maxY - minY) };
}

// ---- Face Selection ----

function faceArea(landmarks, imgW, imgH) {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const lm of landmarks) {
    const px = lm.x * imgW, py = lm.y * imgH;
    if (px < minX) minX = px;
    if (px > maxX) maxX = px;
    if (py < minY) minY = py;
    if (py > maxY) maxY = py;
  }
  return { area: (maxX - minX) * (maxY - minY), minX, maxX, minY, maxY, cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
}

function selectFace(faces, hint, imgW, imgH) {
  if (!faces || faces.length === 0) return -1;
  if (faces.length === 1) return 0;

  const faceMetas = faces.map((f, i) => ({ index: i, ...faceArea(f, imgW, imgH) }));

  switch (hint) {
    case 'leftmost': {
      let best = faceMetas[0];
      for (const m of faceMetas) { if (m.cx < best.cx) best = m; }
      return best.index;
    }
    case 'rightmost': {
      let best = faceMetas[0];
      for (const m of faceMetas) { if (m.cx > best.cx) best = m; }
      return best.index;
    }
    case 'center': {
      const imgCx = imgW / 2;
      let best = faceMetas[0], bestDist = Math.abs(best.cx - imgCx);
      for (const m of faceMetas) {
        const d = Math.abs(m.cx - imgCx);
        if (d < bestDist) { best = m; bestDist = d; }
      }
      return best.index;
    }
    case 'largest':
    default: {
      let best = faceMetas[0];
      for (const m of faceMetas) { if (m.area > best.area) best = m; }
      return best.index;
    }
  }
}

// ---- Per-Eye Transform Computation ----

// =====================================================================
// TWO-FRAME ARCHITECTURE: Eye Frame vs Patch Frame
// =====================================================================
//
// WHY THE OLD ARCHITECTURE KEPT PRODUCING "CLOSE BUT WRONG" RESULTS:
//   The old code solved placement from eye-internal anchors (corner midpoint)
//   but applied that transform to a larger carrier patch. The carrier patch
//   is the expanded polygon used for copy/paste in Photopea — it includes
//   blend margins, upper brow, lower lash area, etc. The eye sits INSIDE
//   this carrier patch, offset from the patch's geometric center.
//
//   When Photopea applies resize/rotate around the patch bbox center
//   (AnchorPosition.MIDDLECENTER), the eye inside the patch moves differently
//   than the solver predicted, because the solver was reasoning about eye
//   anchors but the pivot is the patch center. A single midpoint constraint
//   can be "right" while individual corners, iris, and lid points are wrong.
//
// THE NEW DESIGN:
//   1. ANATOMICAL EYE FRAME — where the actual eye must land.
//      Defined by stable anchors: inner corner, outer corner, iris center,
//      upper/lower lid apex, nose bridge (face-structure anchor).
//      This is what we SOLVE for.
//
//   2. CARRIER PATCH FRAME — the larger polygon copied from the donor.
//      Exists for blending, lash texture, and surrounding skin transport.
//      Has its own bbox center which Photopea uses as transform pivot.
//      This is what we APPLY the transform to.
//
//   The patch placement is DERIVED from the solved eye frame — the patch
//   does not define where the eye belongs. The solver optimizes anchor
//   landing across multiple points, then reverse-engineers the Photopea
//   transform (scale, rotation, translate around patch bbox center) that
//   achieves that landing.
// =====================================================================

// Simulate Photopea's transform chain on a single point.
// Photopea applies: 1) resize around pivot, 2) rotate around pivot, 3) translate.
// This is the forward model — given transform params, where does a point end up?
function applyTransformToPoint(px, py, pivotX, pivotY, scale, rotation, tx, ty) {
  // Scale around pivot
  const sx = pivotX + (px - pivotX) * scale;
  const sy = pivotY + (py - pivotY) * scale;
  // Rotate around pivot
  const cos = Math.cos(rotation);
  const sin = Math.sin(rotation);
  const dx = sx - pivotX;
  const dy = sy - pivotY;
  const rx = pivotX + dx * cos - dy * sin;
  const ry = pivotY + dx * sin + dy * cos;
  // Translate
  return [rx + tx, ry + ty];
}

// Compute weighted multi-anchor error for a candidate transform.
// Returns { totalError, perAnchor: { name: distance, ... } }
// This evaluates: if we apply (scale, rotation, tx, ty) around the patch pivot,
// how far does each transformed source anchor land from its target position?
function computeMultiAnchorError(srcAnchors, tgtAnchors, pivotX, pivotY, scale, rotation, tx, ty, weights) {
  let totalError = 0;
  const perAnchor = {};
  for (const name in weights) {
    if (!srcAnchors[name] || !tgtAnchors[name]) continue;
    const [rx, ry] = applyTransformToPoint(
      srcAnchors[name][0], srcAnchors[name][1],
      pivotX, pivotY, scale, rotation, tx, ty
    );
    const dist = Math.sqrt(
      Math.pow(rx - tgtAnchors[name][0], 2) +
      Math.pow(ry - tgtAnchors[name][1], 2)
    );
    perAnchor[name] = Math.round(dist * 100) / 100;
    totalError += dist * weights[name];
  }
  return { totalError: Math.round(totalError * 100) / 100, perAnchor };
}

// =====================================================================
// STAGE 1: Solve the anatomical eye transform
// =====================================================================
// Uses eye corners for initial closed-form guess (scale + rotation),
// then runs a deterministic coordinate-descent refinement to minimize
// weighted multi-anchor error.
//
// WHY REFINEMENT:
//   A single closed-form transform (corner midpoint + nose correction) is
//   not enough when the thing being aligned is the eye INSIDE a larger patch.
//   The patch pivot (bbox center) is offset from the eye center, so a transform
//   that perfectly lands the corner midpoint doesn't guarantee individual
//   corners, iris, or lid points land correctly. The refinement searches
//   locally around the initial guess and finds the transform that minimizes
//   total weighted anchor error — still fully deterministic and debuggable.
//
// ANCHOR WEIGHTS for blink repair:
//   Corners = highest (1.0) — must land exactly for alignment
//   Iris center = high (0.7) — gaze direction must feel correct
//   Lower lid = medium (0.4) — lash line must track face structure
//   Nose bridge = medium (0.3) — locks eye to face, prevents drift
//   Upper lid = low (0.1) — corrupted by blink in base, unreliable target
// =====================================================================
function solveEyeFrameTransform(srcAnchors, tgtAnchors, srcPatchBB, faceStabilizer) {
  const pivotX = srcPatchBB.x + srcPatchBB.width / 2;
  const pivotY = srcPatchBB.y + srcPatchBB.height / 2;

  // Anchor weights — explicit so the objective is clear and tunable
  const weights = {
    anchor1: 1.0,       // outer/inner corner — highest priority
    anchor2: 1.0,       // other corner — highest priority
    irisCenter: 0.7,    // gaze alignment
    lowerLid: 0.4,      // lower-lash / face structure
    upperLid: 0.1       // low — corrupted by blink in base
  };

  // Add face-structure anchor (nose bridge) to both anchor sets for error computation
  const srcAnchorsExt = { ...srcAnchors };
  const tgtAnchorsExt = { ...tgtAnchors };
  if (faceStabilizer && faceStabilizer.srcNoseBridge && faceStabilizer.tgtNoseBridge) {
    srcAnchorsExt.noseBridge = faceStabilizer.srcNoseBridge;
    tgtAnchorsExt.noseBridge = faceStabilizer.tgtNoseBridge;
    weights.noseBridge = 0.3;
  }

  // ---- Initial guess from corners (closed-form) ----
  const sdx = srcAnchors.anchor2[0] - srcAnchors.anchor1[0];
  const sdy = srcAnchors.anchor2[1] - srcAnchors.anchor1[1];
  const sDist = Math.sqrt(sdx * sdx + sdy * sdy);
  const sAngle = Math.atan2(sdy, sdx);

  const tdx = tgtAnchors.anchor2[0] - tgtAnchors.anchor1[0];
  const tdy = tgtAnchors.anchor2[1] - tgtAnchors.anchor1[1];
  const tDist = Math.sqrt(tdx * tdx + tdy * tdy);
  const tAngle = Math.atan2(tdy, tdx);

  let scale = sDist > 0.001 ? tDist / sDist : 1.0;
  let rotation = (sDist > 0.001 && tDist > 0.001) ? tAngle - sAngle : 0;

  // Solve initial translation so corner midpoint lands on target midpoint
  const srcMidX = (srcAnchors.anchor1[0] + srcAnchors.anchor2[0]) / 2;
  const srcMidY = (srcAnchors.anchor1[1] + srcAnchors.anchor2[1]) / 2;
  const tgtMidX = (tgtAnchors.anchor1[0] + tgtAnchors.anchor2[0]) / 2;
  const tgtMidY = (tgtAnchors.anchor1[1] + tgtAnchors.anchor2[1]) / 2;

  const [initLandX, initLandY] = applyTransformToPoint(
    srcMidX, srcMidY, pivotX, pivotY, scale, rotation, 0, 0
  );
  let tx = tgtMidX - initLandX;
  let ty = tgtMidY - initLandY;

  // ---- Compute initial error (before refinement) ----
  const initError = computeMultiAnchorError(
    srcAnchorsExt, tgtAnchorsExt, pivotX, pivotY, scale, rotation, tx, ty, weights
  );

  // ---- Lid-height ratio (diagnostic only, NOT applied for blink repair) ----
  const srcVDist = Math.sqrt(
    Math.pow(srcAnchors.upperLid[0] - srcAnchors.lowerLid[0], 2) +
    Math.pow(srcAnchors.upperLid[1] - srcAnchors.lowerLid[1], 2)
  );
  const tgtVDist = Math.sqrt(
    Math.pow(tgtAnchors.upperLid[0] - tgtAnchors.lowerLid[0], 2) +
    Math.pow(tgtAnchors.upperLid[1] - tgtAnchors.lowerLid[1], 2)
  );
  const lidScaleY = srcVDist > 0.001 ? tgtVDist / srcVDist : scale;

  // ---- STAGE 2: Deterministic coordinate-descent refinement ----
  // Searches locally around the initial guess to minimize multi-anchor error.
  // Parameters: tx, ty, rotation, scale (4D).
  // Steps are small and bounded — fast and deterministic.
  const MAX_ROUNDS = 12;
  const txStep = 0.5;     // ±0.5 px translation steps
  const tyStep = 0.5;
  const rotStep = 0.001;  // ±0.057 degrees rotation steps
  const scaleStep = 0.003; // ±0.3% scale steps

  let bestError = initError.totalError;
  let improved = true;

  for (let round = 0; round < MAX_ROUNDS && improved; round++) {
    improved = false;

    // Try each parameter direction
    const candidates = [
      { param: 'tx', delta: txStep },
      { param: 'tx', delta: -txStep },
      { param: 'ty', delta: tyStep },
      { param: 'ty', delta: -tyStep },
      { param: 'rot', delta: rotStep },
      { param: 'rot', delta: -rotStep },
      { param: 'scale', delta: scaleStep },
      { param: 'scale', delta: -scaleStep }
    ];

    for (const cand of candidates) {
      let candTx = tx, candTy = ty, candRot = rotation, candScale = scale;
      if (cand.param === 'tx') candTx += cand.delta;
      else if (cand.param === 'ty') candTy += cand.delta;
      else if (cand.param === 'rot') candRot += cand.delta;
      else if (cand.param === 'scale') candScale += cand.delta;

      const err = computeMultiAnchorError(
        srcAnchorsExt, tgtAnchorsExt, pivotX, pivotY,
        candScale, candRot, candTx, candTy, weights
      );

      if (err.totalError < bestError) {
        bestError = err.totalError;
        tx = candTx; ty = candTy; rotation = candRot; scale = candScale;
        improved = true;
      }
    }
  }

  // ---- Compute final error (after refinement) ----
  const finalError = computeMultiAnchorError(
    srcAnchorsExt, tgtAnchorsExt, pivotX, pivotY, scale, rotation, tx, ty, weights
  );

  return {
    translateX: Math.round(tx * 10) / 10,
    translateY: Math.round(ty * 10) / 10,
    rotation: Math.round(rotation * 1000) / 1000,
    scale: Math.round(scale * 1000) / 1000,
    // Uniform scale for both axes — preserves donor eye openness for blink repair
    scaleX: Math.round(scale * 1000) / 1000,
    scaleY: Math.round(scale * 1000) / 1000,
    // Diagnostics (NOT applied — available for debugging and future modes)
    _lidScaleY: Math.round(lidScaleY * 1000) / 1000,
    _refinement: {
      initError: initError.totalError,
      finalError: finalError.totalError,
      improvement: Math.round((initError.totalError - finalError.totalError) * 100) / 100,
      finalAnchors: finalError.perAnchor
    }
  };
}

// ---- Eye Landmark Extraction (per-eye) ----

function extractSingleEyePoints(faceLandmarks, indices, imgW, imgH) {
  const points = [];
  for (const idx of indices) {
    if (idx < faceLandmarks.length) {
      const lm = faceLandmarks[idx];
      points.push([Math.round(lm.x * imgW * 10) / 10, Math.round(lm.y * imgH * 10) / 10]);
    }
  }
  return points;
}

function getAnchorPoint(faceLandmarks, idx, imgW, imgH) {
  const lm = faceLandmarks[idx];
  return [lm.x * imgW, lm.y * imgH];
}

function getAnchorPointSafe(faceLandmarks, idx, imgW, imgH, fallback) {
  if (idx >= faceLandmarks.length) return fallback || null;
  const lm = faceLandmarks[idx];
  return [lm.x * imgW, lm.y * imgH];
}

// ---- Blink Detection Heuristic ----
// Eye aspect ratio: ratio of vertical extent to horizontal extent.
// Lower = more closed. Useful for base/reference sanity check.
function eyeAspectRatio(leftEyePoints, rightEyePoints) {
  function ear(pts) {
    const bb = boundingBox(pts);
    if (bb.width < 1) return 0;
    return bb.height / bb.width;
  }
  return (ear(leftEyePoints) + ear(rightEyePoints)) / 2;
}

// ---- Blend Policy ----
// Feather radius is proportional to the processed patch width, not a fixed
// pixel value. This ensures the blend zone scales with the eye/image size.
// Opacity is slightly softened (97%) as a low-risk way to reduce harsh
// donor-vs-base tonal contrast. This is NOT a substitute for true color
// matching — it is a conservative structural improvement.

function eyeBlendPolicy(transform, overallConfidence, processedPathPoints) {
  let opacity = 97;

  // Size-aware feather: 7% of processed patch width, clamped to [3, 6]
  const patchBB = boundingBox(processedPathPoints);
  let featherRadius = Math.round(patchBB.width * 0.07);
  featherRadius = Math.max(3, Math.min(6, featherRadius));

  const scaleDelta = Math.abs((transform.scale || 1.0) - 1.0);
  const rotationDeg = Math.abs((transform.rotation || 0) * 180 / Math.PI);

  if (overallConfidence < 0.6 || scaleDelta > 0.15 || rotationDeg > 5) {
    featherRadius = Math.min(featherRadius + 1, 7);
    opacity = 96;
  }

  return { opacity, featherRadius };
}

// ---- Debug Rendering ----

function renderDebug(img, faces, selectedIdx, leftEyePoints, rightEyePoints, leftBbox, rightBbox, label) {
  const container = document.getElementById('debug-container');
  if (!container || !window.MEDIAPIPE_DEBUG) return;

  container.style.display = 'flex';
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Draw all face bounding boxes
  for (let i = 0; i < faces.length; i++) {
    const meta = faceArea(faces[i], img.naturalWidth, img.naturalHeight);
    ctx.strokeStyle = i === selectedIdx ? '#00ff00' : '#666666';
    ctx.lineWidth = i === selectedIdx ? 3 : 1;
    ctx.strokeRect(meta.minX, meta.minY, meta.maxX - meta.minX, meta.maxY - meta.minY);
    ctx.fillStyle = i === selectedIdx ? '#00ff00' : '#666666';
    ctx.font = '14px monospace';
    ctx.fillText('Face ' + i + (i === selectedIdx ? ' (selected)' : ''), meta.minX, meta.minY - 4);
  }

  // Draw left eye landmarks (cyan)
  ctx.fillStyle = '#00ccff';
  for (const [x, y] of leftEyePoints) {
    ctx.beginPath(); ctx.arc(x, y, 2, 0, 2 * Math.PI); ctx.fill();
  }
  // Draw right eye landmarks (magenta)
  ctx.fillStyle = '#ff00cc';
  for (const [x, y] of rightEyePoints) {
    ctx.beginPath(); ctx.arc(x, y, 2, 0, 2 * Math.PI); ctx.fill();
  }

  // Draw left eye patch box
  if (leftBbox) {
    ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 2; ctx.setLineDash([6, 3]);
    ctx.strokeRect(leftBbox.x, leftBbox.y, leftBbox.width, leftBbox.height);
    ctx.setLineDash([]);
    ctx.fillStyle = '#00ccff'; ctx.font = '11px monospace';
    ctx.fillText('L_EYE', leftBbox.x, leftBbox.y - 3);
  }
  // Draw right eye patch box
  if (rightBbox) {
    ctx.strokeStyle = '#ff00cc'; ctx.lineWidth = 2; ctx.setLineDash([6, 3]);
    ctx.strokeRect(rightBbox.x, rightBbox.y, rightBbox.width, rightBbox.height);
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff00cc'; ctx.font = '11px monospace';
    ctx.fillText('R_EYE', rightBbox.x, rightBbox.y - 3);
  }

  // Label
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, label.length * 10 + 16, 24);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(label, 8, 17);

  container.appendChild(canvas);
}

// ---- Image Loading ----

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = (e) => reject(new Error('Failed to load image: ' + url));
    img.src = url;
  });
}

// ---- Main Detection Function ----

window.detectEyeGeometry = async function(baseUrl, refUrl, baseFaceHint, refFaceHint) {
  if (!faceLandmarker) throw new Error('MediaPipe not initialized');

  baseFaceHint = baseFaceHint || 'largest';
  refFaceHint = refFaceHint || 'largest';

  // Load both images
  const [baseImg, refImg] = await Promise.all([loadImage(baseUrl), loadImage(refUrl)]);
  const baseW = baseImg.naturalWidth, baseH = baseImg.naturalHeight;
  const refW = refImg.naturalWidth, refH = refImg.naturalHeight;

  // Detect faces in both images
  const baseResult = faceLandmarker.detect(baseImg);
  const refResult = faceLandmarker.detect(refImg);

  const baseFaces = baseResult.faceLandmarks || [];
  const refFaces = refResult.faceLandmarks || [];

  if (baseFaces.length === 0) {
    return { success: false, error: 'No face detected in base image', detections: { baseFaces: 0, referenceFaces: refFaces.length } };
  }
  if (refFaces.length === 0) {
    return { success: false, error: 'No face detected in reference image', detections: { baseFaces: baseFaces.length, referenceFaces: 0 } };
  }

  // Select faces
  const baseFaceIdx = selectFace(baseFaces, baseFaceHint, baseW, baseH);
  const refFaceIdx = selectFace(refFaces, refFaceHint, refW, refH);

  const baseFaceLm = baseFaces[baseFaceIdx];
  const refFaceLm = refFaces[refFaceIdx];

  // ---- Extract per-eye landmarks (pixel space) ----
  const baseLeftRaw = extractSingleEyePoints(baseFaceLm, FEATURE_GROUPS.left_eye, baseW, baseH);
  const baseRightRaw = extractSingleEyePoints(baseFaceLm, FEATURE_GROUPS.right_eye, baseW, baseH);
  const refLeftRaw = extractSingleEyePoints(refFaceLm, FEATURE_GROUPS.left_eye, refW, refH);
  const refRightRaw = extractSingleEyePoints(refFaceLm, FEATURE_GROUPS.right_eye, refW, refH);

  // ---- Process into smooth path points with eyelid-aware margins ----
  const baseLeftPath = processEyePoints(baseLeftRaw);
  const baseRightPath = processEyePoints(baseRightRaw);
  const refLeftPath = processEyePoints(refLeftRaw);
  const refRightPath = processEyePoints(refRightRaw);

  // ---- Bounding boxes ----
  const baseLeftBbox = boundingBox(baseLeftPath);
  const baseRightBbox = boundingBox(baseRightPath);
  const refLeftBbox = boundingBox(refLeftPath);
  const refRightBbox = boundingBox(refRightPath);

  // ---- Extract detailed eye anchors for corner-locked transform ----
  // Corners drive scale + rotation. Lid apices stored for diagnostics only.
  const baseLeftAnchors = {
    anchor1: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.left_eye.outerCorner, baseW, baseH),
    anchor2: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.left_eye.innerCorner, baseW, baseH),
    upperLid: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.left_eye.upperLid, baseW, baseH),
    lowerLid: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.left_eye.lowerLid, baseW, baseH),
    irisCenter: getAnchorPointSafe(baseFaceLm, EYE_DETAIL_ANCHORS.left_eye.irisCenter, baseW, baseH, centroid(baseLeftRaw))
  };
  const baseRightAnchors = {
    anchor1: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.right_eye.innerCorner, baseW, baseH),
    anchor2: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.right_eye.outerCorner, baseW, baseH),
    upperLid: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.right_eye.upperLid, baseW, baseH),
    lowerLid: getAnchorPoint(baseFaceLm, EYE_DETAIL_ANCHORS.right_eye.lowerLid, baseW, baseH),
    irisCenter: getAnchorPointSafe(baseFaceLm, EYE_DETAIL_ANCHORS.right_eye.irisCenter, baseW, baseH, centroid(baseRightRaw))
  };
  const refLeftAnchors = {
    anchor1: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.left_eye.outerCorner, refW, refH),
    anchor2: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.left_eye.innerCorner, refW, refH),
    upperLid: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.left_eye.upperLid, refW, refH),
    lowerLid: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.left_eye.lowerLid, refW, refH),
    irisCenter: getAnchorPointSafe(refFaceLm, EYE_DETAIL_ANCHORS.left_eye.irisCenter, refW, refH, centroid(refLeftRaw))
  };
  const refRightAnchors = {
    anchor1: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.right_eye.innerCorner, refW, refH),
    anchor2: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.right_eye.outerCorner, refW, refH),
    upperLid: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.right_eye.upperLid, refW, refH),
    lowerLid: getAnchorPoint(refFaceLm, EYE_DETAIL_ANCHORS.right_eye.lowerLid, refW, refH),
    irisCenter: getAnchorPointSafe(refFaceLm, EYE_DETAIL_ANCHORS.right_eye.irisCenter, refW, refH, centroid(refRightRaw))
  };

  // ---- Face-structure stabilizer (nose bridge) ----
  // Anchors the eye placement relative to the nose line, preventing
  // vertical drift. Stable whether eyes are open or closed.
  const baseNoseBridge = getAnchorPoint(baseFaceLm, FACE_STRUCTURE_ANCHORS.noseBridge, baseW, baseH);
  const refNoseBridge = getAnchorPoint(refFaceLm, FACE_STRUCTURE_ANCHORS.noseBridge, refW, refH);
  const faceStabilizer = {
    srcNoseBridge: refNoseBridge,
    tgtNoseBridge: baseNoseBridge
  };

  // ---- Per-eye transforms (two-frame: eye frame → patch frame) ----
  // Stage 1: Solve anatomical eye placement from multi-anchor error minimization.
  //   - Corners, iris, lower lid, nose bridge all contribute to the error.
  //   - Initial guess from corners, then deterministic coordinate-descent refinement.
  //   - Uniform scale preserves donor eye openness (no lid-height squeeze).
  // Stage 2: The solved transform is expressed in patch-frame coordinates
  //   (scale/rotation around patch bbox center + translate) so the executor
  //   can apply it directly via Photopea. The eye anchors guided the solve,
  //   but the patch carries the result.
  const leftTransform = solveEyeFrameTransform(
    refLeftAnchors, baseLeftAnchors, refLeftBbox, faceStabilizer
  );
  const rightTransform = solveEyeFrameTransform(
    refRightAnchors, baseRightAnchors, refRightBbox, faceStabilizer
  );

  // ---- Confidence ----
  let confidence = 1.0;
  const avgScale = (leftTransform.scale + rightTransform.scale) / 2;
  const avgRot = (Math.abs(leftTransform.rotation) + Math.abs(rightTransform.rotation)) / 2;
  if (Math.abs(avgScale - 1.0) > 0.3) confidence -= 0.2;
  if (avgRot > 0.15) confidence -= 0.2;
  if (baseFaces.length > 3 || refFaces.length > 3) confidence -= 0.1;
  confidence = Math.max(0, Math.round(confidence * 100) / 100);

  // ---- Blend policy per eye ----
  const leftBlend = eyeBlendPolicy(leftTransform, confidence, refLeftPath);
  const rightBlend = eyeBlendPolicy(rightTransform, confidence, refRightPath);

  // ---- Eye aspect ratio for blink detection ----
  const baseEAR = eyeAspectRatio(baseLeftRaw, baseRightRaw);
  const refEAR = eyeAspectRatio(refLeftRaw, refRightRaw);

  // ---- Debug rendering ----
  renderDebug(baseImg, baseFaces, baseFaceIdx, baseLeftRaw, baseRightRaw, baseLeftBbox, baseRightBbox, 'BASE (target)');
  renderDebug(refImg, refFaces, refFaceIdx, refLeftRaw, refRightRaw, refLeftBbox, refRightBbox, 'REFERENCE (source)');

  // ---- Build face bbox preview data ----
  const allBaseFaceBboxes = baseFaces.map(f => faceArea(f, baseW, baseH));
  const allRefFaceBboxes = refFaces.map(f => faceArea(f, refW, refH));

  return {
    success: true,
    imageMeta: {
      base: { width: baseW, height: baseH },
      reference: { width: refW, height: refH }
    },
    detections: {
      baseFaces: baseFaces.length,
      referenceFaces: refFaces.length,
      chosenBaseFaceIndex: baseFaceIdx,
      chosenReferenceFaceIndex: refFaceIdx
    },
    blinkHeuristic: {
      baseEAR: Math.round(baseEAR * 1000) / 1000,
      refEAR: Math.round(refEAR * 1000) / 1000,
      baseMoreClosed: baseEAR < refEAR
    },
    features: [
      {
        name: 'left_eye',
        source: { rawPoints: refLeftRaw, pathPoints: refLeftPath, boundingBox: refLeftBbox },
        target: { rawPoints: baseLeftRaw, pathPoints: baseLeftPath, boundingBox: baseLeftBbox },
        placementTransform: leftTransform,
        recommendedBlend: leftBlend
      },
      {
        name: 'right_eye',
        source: { rawPoints: refRightRaw, pathPoints: refRightPath, boundingBox: refRightBbox },
        target: { rawPoints: baseRightRaw, pathPoints: baseRightPath, boundingBox: baseRightBbox },
        placementTransform: rightTransform,
        recommendedBlend: rightBlend
      }
    ],
    confidence: confidence,
    previewData: {
      allBaseFaces: allBaseFaceBboxes.map(m => ({ x: Math.round(m.minX), y: Math.round(m.minY), width: Math.round(m.maxX - m.minX), height: Math.round(m.maxY - m.minY) })),
      allRefFaces: allRefFaceBboxes.map(m => ({ x: Math.round(m.minX), y: Math.round(m.minY), width: Math.round(m.maxX - m.minX), height: Math.round(m.maxY - m.minY) })),
      baseLeftEyeLandmarks: baseLeftRaw,
      baseRightEyeLandmarks: baseRightRaw,
      refLeftEyeLandmarks: refLeftRaw,
      refRightEyeLandmarks: refRightRaw,
      selectedBaseFaceIdx: baseFaceIdx,
      selectedRefFaceIdx: refFaceIdx
    }
  };
};

// Initialize on load
initMediaPipe().catch(err => {
  console.error('[mediapipe] Fatal init error:', err);
});
</script>
